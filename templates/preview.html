<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Preview - Subtitle Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .subtitle-item { transition: all 0.15s ease; }
        .subtitle-item.active { background: #3730a3; border-color: #6366f1; }
        .subtitle-item.active .time-badge { background: #6366f1; }
        #video-area video { max-height: calc(100vh - 180px); }
        .video-subtitle {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: white; padding: 6px 16px;
            border-radius: 8px; font-size: 1rem; font-weight: 600;
            text-align: center; max-width: 90%; pointer-events: none;
            white-space: pre-line; line-height: 1.4;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 상단 헤더 -->
    <div class="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-700 flex-shrink-0">
        <div class="flex items-center gap-3">
            <a href="/" class="text-slate-400 hover:text-white transition-colors text-sm font-bold">← Back</a>
            <span class="text-slate-600">|</span>
            <h1 class="text-sm font-extrabold text-white">SRT Subtitle Preview</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="subtitle-count" class="text-xs text-slate-400 font-medium"></span>
            <label class="flex items-center gap-2 cursor-pointer bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-xl transition-colors">
                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.868v6.264a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                <span class="text-xs font-bold text-slate-300">Load Video</span>
                <input type="file" id="video-input" accept="video/*" class="hidden">
            </label>
            <label class="flex items-center gap-2 cursor-pointer bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 rounded-xl transition-colors">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"/></svg>
                <span class="text-xs font-bold text-white">Load SRT</span>
                <input type="file" id="srt-input" accept=".srt" class="hidden">
            </label>
        </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="flex flex-1 overflow-hidden">

        <!-- 왼쪽: 자막 목록 -->
        <div class="w-96 flex-shrink-0 bg-slate-900 border-r border-slate-700 flex flex-col">
            <div class="px-4 py-3 border-b border-slate-700 flex-shrink-0">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Search subtitles..." class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500">
                    <svg class="absolute right-3 top-2.5 w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
            <div id="subtitle-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- 자막 아이템들이 여기 들어감 -->
                <div class="flex items-center justify-center h-full text-slate-500 text-xs text-center px-8 py-12">
                    <div>
                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        </div>
                        <p class="font-bold text-slate-400 mb-1">No subtitles loaded</p>
                        <p class="text-slate-500">Click "Load SRT" to open a subtitle file</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 오른쪽: 비디오 영역 -->
        <div id="video-area" class="flex-1 bg-black flex items-center justify-center relative overflow-hidden">
            <!-- 비디오 없을 때 -->
            <div id="video-placeholder" class="text-center">
                <div class="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.868v6.264a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>
                <p class="text-slate-400 font-bold mb-1">Drop video here</p>
                <p class="text-slate-600 text-sm">or click "Load Video" above</p>
            </div>
            <!-- 비디오 -->
            <video id="video-player" class="hidden w-full h-full object-contain" controls></video>
            <!-- 자막 오버레이 -->
            <div id="subtitle-overlay" class="video-subtitle hidden"></div>
        </div>
    </div>

    <!-- 하단 재생 정보 -->
    <div class="px-6 py-2 bg-slate-900 border-t border-slate-700 flex items-center gap-4 flex-shrink-0">
        <span id="current-time-display" class="text-xs font-mono text-slate-400">00:00:00</span>
        <span class="text-slate-600 text-xs">|</span>
        <span id="current-subtitle-display" class="text-xs text-slate-300 truncate flex-1 font-medium"></span>
    </div>

<script>
    let subtitles = [];
    let currentIndex = -1;
    let videoEl = document.getElementById('video-player');
    let allItems = [];

    // URL에서 SRT 파라미터 읽기
    const urlParams = new URLSearchParams(window.location.search);
    const srtParam = urlParams.get('srt');
    if(srtParam){
        const decoded = decodeURIComponent(srtParam);
        parseSRT(decoded);
    }

    function parseSRT(text){
        subtitles = [];
        const blocks = text.trim().split(/\n\s*\n/);
        blocks.forEach(block => {
            const lines = block.trim().split('\n');
            if(lines.length < 3) return;
            const timeLine = lines[1];
            const match = timeLine.match(/(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{3})/);
            if(!match) return;
            const start = timeToSec(match[1]);
            const end = timeToSec(match[2]);
            const text = lines.slice(2).join('\n');
            subtitles.push({ start, end, text });
        });
        document.getElementById('subtitle-count').innerText = subtitles.length + ' subtitles';
        renderList(subtitles);
    }

    function timeToSec(t){
        t = t.replace(',','.');
        const parts = t.split(':');
        return parseFloat(parts[0])*3600 + parseFloat(parts[1])*60 + parseFloat(parts[2]);
    }

    function secToTime(s){
        const h = Math.floor(s/3600);
        const m = Math.floor((s%3600)/60);
        const sec = Math.floor(s%60);
        return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    }

    function renderList(subs){
        const list = document.getElementById('subtitle-list');
        list.innerHTML = '';
        allItems = [];
        subs.forEach((sub, i) => {
            const div = document.createElement('div');
            div.className = 'subtitle-item flex gap-3 p-3 rounded-xl border border-transparent cursor-pointer hover:bg-slate-800 hover:border-slate-600';
            div.dataset.index = i;
            div.innerHTML = `
                <div class="flex-shrink-0 pt-0.5">
                    <span class="time-badge text-[10px] font-mono bg-slate-700 text-slate-300 px-2 py-0.5 rounded-lg">${secToTime(sub.start)}</span>
                </div>
                <p class="text-xs text-slate-300 leading-relaxed">${sub.text.replace(/\n/g,'<br>')}</p>
            `;
            div.onclick = () => {
                if(videoEl && !videoEl.paused || videoEl.src){
                    videoEl.currentTime = sub.start;
                }
                highlightItem(i);
            };
            list.appendChild(div);
            allItems.push(div);
        });
    }

    function highlightItem(idx){
        allItems.forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
        currentIndex = idx;
        if(allItems[idx]){
            allItems[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        const sub = subtitles[idx];
        if(sub){
            document.getElementById('current-subtitle-display').innerText = sub.text.replace(/\n/g,' ');
        }
    }

    // 비디오 시간 동기화
    videoEl.addEventListener('timeupdate', () => {
        const t = videoEl.currentTime;
        document.getElementById('current-time-display').innerText = secToTime(t);
        // 현재 자막 찾기
        const idx = subtitles.findIndex(s => t >= s.start && t <= s.end);
        const overlay = document.getElementById('subtitle-overlay');
        if(idx >= 0){
            overlay.classList.remove('hidden');
            overlay.innerHTML = subtitles[idx].text.replace(/\n/g,'<br>');
            if(idx !== currentIndex) highlightItem(idx);
        } else {
            overlay.classList.add('hidden');
            document.getElementById('current-subtitle-display').innerText = '';
        }
    });

    // SRT 파일 로드
    document.getElementById('srt-input').onchange = function(){
        const file = this.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => parseSRT(ev.target.result);
        reader.readAsText(file, 'utf-8');
    };

    // 비디오 파일 로드
    document.getElementById('video-input').onchange = function(){
        const file = this.files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        videoEl.src = url;
        videoEl.classList.remove('hidden');
        document.getElementById('video-placeholder').classList.add('hidden');
    };

    // 비디오 드래그앤드롭
    const videoArea = document.getElementById('video-area');
    videoArea.addEventListener('dragover', e => { e.preventDefault(); videoArea.style.background='rgba(99,102,241,0.1)'; });
    videoArea.addEventListener('dragleave', () => { videoArea.style.background=''; });
    videoArea.addEventListener('drop', e => {
        e.preventDefault(); videoArea.style.background='';
        const file = e.dataTransfer.files[0];
        if(file && file.type.startsWith('video/')){
            videoEl.src = URL.createObjectURL(file);
            videoEl.classList.remove('hidden');
            document.getElementById('video-placeholder').classList.add('hidden');
        }
    });

    // 검색
    document.getElementById('search-input').oninput = function(){
        const q = this.value.toLowerCase();
        if(!q){ renderList(subtitles); return; }
        const filtered = subtitles.filter(s => s.text.toLowerCase().includes(q));
        renderList(filtered);
    };
</script>
</body>
</html>
